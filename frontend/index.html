<!doctype html>
<html lang="en" class="dark">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" href="/favicon.ico" sizes="32x32" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon-192x192.png" />
    <link rel="apple-touch-icon" sizes="180x180" href="/apple-touch-icon.png" />
    <link rel="manifest" href="/site.webmanifest" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Title and meta tags managed by react-helmet-async per page -->

    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;700;800;900&family=Russo+One&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>

    <!-- Schema.org LocalBusiness Markup -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "LocalBusiness",
      "name": "CNS Tool Repair",
      "address": {
        "@type": "PostalAddress",
        "streetAddress": "Unit 65, 13335 115 Ave",
        "addressLocality": "Surrey",
        "addressRegion": "BC",
        "postalCode": "V3R 2X1",
        "addressCountry": "CA"
      },
      "areaServed": "Metro Vancouver",
      "serviceType": "Industrial Pneumatic Tool Repair",
      "logo": "https://cnstoolrepair.com/logo.png",
      "image": "https://cnstoolrepair.com/og-image.jpg"
    }
    </script>

    <style>
      .material-symbols-outlined {
        font-variation-settings: 'FILL' 0, 'wght' 400, 'GRAD' 0, 'opsz' 24;
      }
    </style>
  </head>
  <body class="bg-background-light dark:bg-background-dark font-display text-slate-900 dark:text-white transition-colors duration-300">
    <div id="root"></div>
    <div id="print-work-order-root"></div>
    <script type="module" src="/src/main.jsx"></script>

</html>
