# HTTP server - redirect to HTTPS
server {
    listen 80;
    server_name cnstoolrepair.com www.cnstoolrepair.com;

    # Redirect all HTTP traffic to HTTPS
    return 301 https://$server_name$request_uri;
}

# HTTPS server
server {
    listen 443 ssl http2;
    server_name cnstoolrepair.com www.cnstoolrepair.com;

    # SSL certificates from Let's Encrypt
    ssl_certificate /etc/letsencrypt/live/cnstoolrepair.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cnstoolrepair.com/privkey.pem;

    # SSL security settings
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "geolocation=(), microphone=(), camera=()" always;
    add_header Content-Security-Policy "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https:; connect-src 'self' https:; frame-src https://www.google.com; frame-ancestors 'self'; base-uri 'self'; object-src 'none'; form-action 'self'" always;

    root /usr/share/nginx/html;
    index index.html;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css text/xml text/javascript application/json application/javascript application/xml+rss application/rss+xml font/truetype font/opentype application/vnd.ms-fontobject image/svg+xml;

    # Main application route
    location / {
        try_files $uri $uri/ /index.html;

        # Cache static assets aggressively
        location ~* \.(js|css|png|jpg|jpeg|gif|webp|svg|ico|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable" always;
            add_header X-Content-Type-Options "nosniff" always;
            access_log off;
        }

        # Don't cache HTML files. No add_header here on purpose: nginx resets
        # inherited add_header directives when a block declares its own, so the
        # app shell inherits the server-level security headers (CSP, etc.).
        # `expires -1` still sends Cache-Control: no-cache for the HTML shell.
        location ~* \.html$ {
            expires -1;
        }
    }

    # Proxy API requests to backend
    location /api {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Timeouts (increased for large photo uploads)
        proxy_connect_timeout 120s;
        proxy_send_timeout 120s;
        proxy_read_timeout 120s;

        # Buffer settings for file uploads (10 photos x 10MB max)
        client_max_body_size 150M;
        proxy_buffering off;
    }

    # Proxy upload file serving to backend
    location /uploads {
        proxy_pass http://backend:8000;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Cache uploaded images
        expires 1y;
        add_header Cache-Control "public, immutable" always;
        # Prevent MIME sniffing on user-uploaded content served from this origin
        add_header X-Content-Type-Options "nosniff" always;
    }

    # NOTE: Swagger UI (/docs, /redoc, /openapi.json) is intentionally NOT proxied
    # in production. The backend also disables it when ENVIRONMENT=production.

    # Deny access to hidden files
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }
}
